                &lt;div class=&quot;bg-white p-6 rounded-2xl shadow-sm border border-gray-100&quot;&gt;&lt;h3 class=&quot;font-bold mb-4&quot;&gt;每题得分率分析&lt;/h3&gt;&lt;div id=&quot;chart-questions&quot; class=&quot;w-full h-80&quot;&gt;&lt;/div&gt;&lt;/div&gt;

    &lt;script type=&quot;module&quot;&gt;
        let distChart, quesChart;
        document.getElementById('enter-btn').addEventListener('click', () =&gt; {
            if (document.getElementById('teacher-pwd').value === '030309') {
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('teacher-view').classList.remove('hidden');
                initApp();
            } else { alert('密码错误！'); }
        });

        function initApp() {
            distChart = echarts.init(document.getElementById('chart-distribution'));
            quesChart = echarts.init(document.getElementById('chart-questions'));
            document.getElementById('teacher-class-filter').addEventListener('change', updateDashboard);
            document.getElementById('refresh-data').addEventListener('click', updateDashboard);
            updateDashboard();
        }

        async function updateDashboard() {
            const filter = document.getElementById('teacher-class-filter').value;
            const data = await fetchData(filter);
            document.getElementById('current-class-view').textContent = filter === 'all' ? '全部班级' : filter;
            
            const count = data.length;
            const avg = count &gt; 0 ? (data.reduce((s, i) =&gt; s + i.score, 0) / count).toFixed(1) : 0;
            const max = count &gt; 0 ? Math.max(...data.map(i =&gt; i.score)) : 0;
            document.getElementById('stat-count').textContent = count;
            document.getElementById('stat-avg').textContent = avg;
            document.getElementById('stat-max').textContent = max;

            const rankingBody = document.getElementById('ranking-body');
            rankingBody.innerHTML = '';
            data.sort((a, b) =&gt; b.score - a.score).forEach((item, idx) =&gt; {
                let sc = &quot;bg-green-100 text-green-700&quot;, st = &quot;不需帮助&quot;;
                if (item.score &lt; 90) { sc = &quot;bg-yellow-100 text-yellow-700&quot;; st = &quot;需要关注&quot;; }
                if (item.score &lt; 60) { sc = &quot;bg-red-100 text-red-700&quot;; st = &quot;急需干预&quot;; }
                rankingBody.innerHTML += `&lt;tr&gt;&lt;td&gt;${idx + 1}&lt;/td&gt;&lt;td class=&quot;font-medium&quot;&gt;${item.name}&lt;/td&gt;&lt;td&gt;${item.class}&lt;/td&gt;&lt;td class=&quot;font-bold text-orange-600&quot;&gt;${item.score}&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;status-badge ${sc}&quot;&gt;${st}&lt;/span&gt;&lt;/td&gt;&lt;/tr&gt;`;
            });

            const ranges = ['0-59', '60-89', '90-119', '120-150']; const rCounts = [0, 0, 0, 0];
            data.forEach(i =&gt; { if (i.score &lt; 60) rCounts[0]++; else if (i.score &lt; 90) rCounts[1]++; else if (i.score &lt; 120) rCounts[2]++; else rCounts[3]++; });
            distChart.setOption({ xAxis: { type: 'category', data: ranges }, yAxis: { type: 'value' }, series: [{ data: rCounts, type: 'bar', itemStyle: { color: '#3b82f6' } }] });

            const qKeys = ['mc1', 'mc2', 'mc3', 'mc4', 'mc5', 'tf1', 'tf2', 'tf3', 'tf4', 'tf5', 'drag'];
            const qRates = qKeys.map(key =&gt; count === 0 ? 0 : (data.reduce((s, i) =&gt; s + (i.stats[key] || 0), 0) / count * 100).toFixed(1));
            quesChart.setOption({ xAxis: { type: 'category', data: qKeys }, yAxis: { type: 'value', max: 100 }, series: [{ data: qRates, type: 'line', smooth: true, areaStyle: {}, itemStyle: { color: '#10b981' } }] });

            updateIntervention(data, qRates, qKeys);
        }

        async function fetchData(classFilter) {
            let db = [];
            try {
                // 使用CORS代理获取quickform.cn数据
                const proxyUrl = 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent('https://quickform.cn/api/fpllg2asnl/all');
                const res = await fetch(proxyUrl);
                const result = await res.json();
                db = result.submissions || result.data || result.list || result.records || [];
                db = db.map(i => {
                    const name = i.name || i.username || '未知';
                    const studentClass = i.class || i.className || '未知';
                    const score = typeof i.score === 'string' ? parseFloat(i.score) : (i.score || 0);
                    let stats = {};
                    if (typeof i.stats === 'string') {
                        try { stats = JSON.parse(i.stats); } catch(e) {}
                    } else if (i.stats) { stats = i.stats; }
                    const time = i.time || i.submitted_at || '未知';
                    return { name, class: studentClass, score, stats, time };
                });
            } catch (e) { console.error(e); }
            return classFilter === 'all' ? db : db.filter(i =&gt; i.class === classFilter);
        }

        function updateIntervention(data, rates, keys) {
            const container = document.getElementById('intervention-content'); container.innerHTML = '';
            const low = data.filter(i =&gt; i.score &lt; 60).length; const mid = data.filter(i =&gt; i.score &gt;= 60 &amp;&amp; i.score &lt; 90).length;
            let minR = 100, wIdx = 0; rates.forEach((r, i) =&gt; { if (parseFloat(r) &lt; minR) { minR = parseFloat(r); wIdx = i; } });
            const advice = [
                { title: '分层概况', content: `当前有 ${low} 名学生急需干预，${mid} 名学生需要关注。` },
                { title: '薄弱环节', content: `第 ${wIdx + 1} 题得分率最低 (${minR}%)，建议重点复习。` },
                { title: '教学建议', content: '针对薄弱知识点，建议增加生活化案例对比。' }
            ];
            advice.forEach(item =&gt; { container.innerHTML += `&lt;div class=&quot;p-4 bg-blue-50 rounded-xl border border-blue-100&quot;&gt;&lt;h4 class=&quot;font-bold text-blue-800 text-sm mb-1&quot;&gt;${item.title}&lt;/h4&gt;&lt;p class=&quot;text-sm text-blue-600&quot;&gt;${item.content}&lt;/p&gt;&lt;/div&gt;`; });
        }
        window.addEventListener('resize', () =&gt; { distChart &amp;&amp; distChart.resize(); quesChart &amp;&amp; quesChart.resize(); });
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
