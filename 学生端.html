                &lt;div id=&quot;analysis-list&quot; class=&quot;space-y-4&quot;&gt;&lt;h3 class=&quot;text-xl font-bold border-b pb-2&quot;&gt;答题详情与解析&lt;/h3&gt;&lt;/div&gt;

    &lt;audio id=&quot;success-sound&quot; src=&quot;https://musk-online.fbcontent.cn/pub-musk-ai-studio/workflow/file/audio/H63Yn2hXWspWnuyjFHpP8L.mp3&quot; style=&quot;display:none&quot;&gt;&lt;/audio&gt;

    &lt;script type=&quot;module&quot;&gt;
        const mcQuestions = [
            { id: 'mc1', q: &quot;在宠物中，'猫'这个大类通常被称为？&quot;, options: ['属性', '类', '对象', '方法'], a: 1, exp: '&ldquo;类&rdquo;是对一类事物的抽象描述。' },
            { id: 'mc2', q: '如果&ldquo;数字猫&rdquo;是一个类，那么你领养的&ldquo;小花&rdquo;是？', options: ['属性', '方法', '对象', '属性值'], a: 2, exp: '&ldquo;小花&rdquo;是具体的实例，即对象。' },
            { id: 'mc3', q: '在属性&ldquo;体重: 3kg&rdquo;中，&ldquo;3kg&rdquo;属于？', options: ['属性名', '属性值', '方法', '类'], a: 1, exp: '&ldquo;3kg&rdquo;是具体的数值。' },
            { id: 'mc4', q: '下列哪项最适合作为数字宠物的&ldquo;方法&rdquo;？', options: ['毛色', '品种', '进食', '生日'], a: 2, exp: '方法描述动作行为。' },
            { id: 'mc5', q: '关于 YAML 格式，下列书写正确的是？', options: ['名字=豆豆', '名字:豆豆', '名字: 豆豆', '名字(豆豆)'], a: 2, exp: 'YAML 冒号后必须有空格。' }
        ];
        const tfQuestions = [
            { id: 'tf1', q: '同一个类的不同对象，拥有的属性种类通常是相同的。', a: true, exp: '对。类定义了属性种类。' },
            { id: 'tf2', q: '宠物的&ldquo;生日&rdquo;属于可变属性。', a: false, exp: '错。生日是固定属性。' },
            { id: 'tf3', q: 'YAML 格式中，缩进必须使用空格，不能使用 Tab 键。', a: true, exp: '对。这是 YAML 规则。' },
            { id: 'tf4', q: '&ldquo;方法&rdquo;主要用来描述宠物的静态特征。', a: false, exp: '错。方法描述动态行为。' },
            { id: 'tf5', q: 'YAML格式中，冒号后面必须加一个空格。', a: true, exp: '对。' }
        ];
        const dragItemsData = [
            { id: 'd1', text: '品种', type: 'fixed' }, { id: 'd2', text: '性别', type: 'fixed' }, { id: 'd3', text: '生日', type: 'fixed' },
            { id: 'd4', text: '体重', type: 'variable' }, { id: 'd5', text: '心情', type: 'variable' }, { id: 'd6', text: '当前位置', type: 'variable' },
            { id: 'd7', text: '年龄', type: 'variable' }, { id: 'd8', text: '毛色', type: 'variable' }, { id: 'd9', text: '饥饿值', type: 'variable' }, { id: 'd10', text: '体温', type: 'variable' }
        ];

        let currentUser = { name: '', class: '' };
        let userAnswers = {};

        document.getElementById('enter-btn').addEventListener('click', () =&gt; {
            const name = document.getElementById('user-name').value.trim();
            if (!name) return alert('请输入姓名！');
            currentUser.name = name;
            currentUser.class = document.getElementById('class-select').value;
            document.getElementById('login-modal').classList.add('hidden');
            document.getElementById('student-view').classList.remove('hidden');
            document.getElementById('display-student-name').textContent = currentUser.name;
            initApp();
        });

        function initApp() {
            renderQuestions();
            initDrag();
        }

        function renderQuestions() {
            const mcContainer = document.getElementById('mc-container');
            mcQuestions.forEach((q, idx) =&gt; {
                const div = document.createElement('div');
                div.innerHTML = `&lt;p class=&quot;font-bold mb-3 text-lg&quot;&gt;${idx + 1}. ${q.q}&lt;/p&gt;&lt;div class=&quot;grid grid-cols-1 md:grid-cols-2 gap-3&quot;&gt;${q.options.map((opt, i) =&gt; `&lt;button class=&quot;option-btn p-4 rounded-xl text-left bg-white border-gray-100 shadow-sm&quot; data-qid=&quot;${q.id}&quot; data-idx=&quot;${i}&quot;&gt;${String.fromCharCode(65 + i)}. ${opt}&lt;/button&gt;`).join('')}&lt;/div&gt;`;
                mcContainer.appendChild(div);
            });
            const tfContainer = document.getElementById('tf-container');
            tfQuestions.forEach((q, idx) =&gt; {
                const div = document.createElement('div');
                div.innerHTML = `&lt;div class=&quot;flex flex-col md:flex-row md:items-center justify-between gap-4&quot;&gt;&lt;p class=&quot;font-bold text-lg&quot;&gt;${idx + 1}. ${q.q}&lt;/p&gt;&lt;div class=&quot;flex gap-3&quot;&gt;&lt;button class=&quot;option-btn px-8 py-3 rounded-xl bg-white border-gray-100 shadow-sm&quot; data-qid=&quot;${q.id}&quot; data-val=&quot;true&quot;&gt;正确&lt;/button&gt;&lt;button class=&quot;option-btn px-8 py-3 rounded-xl bg-white border-gray-100 shadow-sm&quot; data-qid=&quot;${q.id}&quot; data-val=&quot;false&quot;&gt;错误&lt;/button&gt;&lt;/div&gt;&lt;/div&gt;`;
                tfContainer.appendChild(div);
            });
            document.querySelectorAll('.option-btn').forEach(btn =&gt; {
                btn.addEventListener('click', () =&gt; {
                    const qid = btn.dataset.qid;
                    document.querySelectorAll(`[data-qid=&quot;${qid}&quot;]`).forEach(b =&gt; b.classList.remove('selected'));
                    btn.classList.add('selected');
                    userAnswers[qid] = btn.dataset.idx !== undefined ? parseInt(btn.dataset.idx) : (btn.dataset.val === 'true');
                });
            });
        }

        function initDrag() {
            const dragSource = document.getElementById('drag-source');
            dragItemsData.sort(() =&gt; Math.random() - 0.5).forEach(item =&gt; {
                const div = document.createElement('div'); div.className = 'drag-item'; div.textContent = item.text; div.dataset.id = item.id; dragSource.appendChild(div);
            });
            const opt = { group: 'pet-props', animation: 150 };
            new Sortable(dragSource, opt); new Sortable(document.getElementById('fixed-zone'), opt); new Sortable(document.getElementById('variable-zone'), opt);
        }

        document.getElementById('submit-answers-btn').addEventListener('click', async () =&gt; {
            let score = 0; const details = []; const stats = {};
            mcQuestions.forEach(q =&gt; { const ok = userAnswers[q.id] === q.a; if(ok) score += 10; stats[q.id] = ok?1:0; details.push({q:q.q, correct:ok, user:q.options[userAnswers[q.id]]||'未答', ans:q.options[q.a], exp:q.exp}); });
            tfQuestions.forEach(q =&gt; { const ok = userAnswers[q.id] === q.a; if(ok) score += 10; stats[q.id] = ok?1:0; details.push({q:q.q, correct:ok, user:userAnswers[q.id]===undefined?'未答':(userAnswers[q.id]?'正确':'错误'), ans:q.a?'正确':'错误', exp:q.exp}); });
            const fz = Array.from(document.getElementById('fixed-zone').children).map(el =&gt; el.textContent);
            const vz = Array.from(document.getElementById('variable-zone').children).map(el =&gt; el.textContent);
            const cf = ['品种', '性别', '生日']; const cv = ['体重', '心情', '当前位置', '年龄', '毛色', '饥饿值', '体温'];
            let ds = 0; fz.forEach(i =&gt; { if(cf.includes(i)) ds += 5; }); vz.forEach(i =&gt; { if(cv.includes(i)) ds += 5; });
            score += ds; stats['drag'] = ds/50;
            details.push({q:'属性分类', correct:ds===50, user:`固定:${fz.join(',')} | 可变:${vz.join(',')}`, ans:`固定:${cf.join(',')} | 可变:${cv.join(',')}`, exp:'固定属性不随时间改变。'});

            const data = { name: currentUser.name, class: currentUser.class, score: score, stats: stats, time: new Date().toLocaleString() };
            try {
                const fd = new FormData(); for(const k in data) fd.append(k, typeof data[k]==='object'?JSON.stringify(data[k]):data[k]);
                await fetch('/api/submit', { method: 'POST', body: fd });
            } catch(e) { console.error(e); }

            document.getElementById('student-result').classList.remove('hidden');
            document.getElementById('final-score').textContent = score;
            document.getElementById('success-sound').play();
            document.getElementById('final-feedback').textContent = score &gt;= 130 ? &quot;太棒啦！🏆&quot; : (score &gt;= 90 ? &quot;做得不错！✨&quot; : &quot;加油哦！💪&quot;);
            const list = document.getElementById('analysis-list');
            details.forEach(item =&gt; {
                const div = document.createElement('div'); div.className = `p-4 rounded-xl ${item.correct ? 'bg-green-50' : 'bg-red-50'} border`;
                div.innerHTML = `&lt;p class=&quot;font-bold&quot;&gt;${item.q}&lt;/p&gt;&lt;p class=&quot;text-sm&quot;&gt;你的答案: ${item.user}&lt;/p&gt;&lt;p class=&quot;text-sm&quot;&gt;正确答案: ${item.ans}&lt;/p&gt;&lt;p class=&quot;text-xs text-gray-500 mt-2&quot;&gt;解析: ${item.exp}&lt;/p&gt;`;
                list.appendChild(div);
            });
        });
    &lt;/script&gt;

    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)

        })

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
